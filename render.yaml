services:
  - type: web
    name: queyoumajiang-backend
    env: node
    region: singapore
    plan: free
    buildCommand: pnpm install && pnpm build:protocol && pnpm build:backend
    startCommand: node packages/backend/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
      - key: HOSTNAME
        value: render-1
      - key: REDIS_HOST
        value: localhost
