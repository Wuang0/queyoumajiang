services:
  - type: web
    name: queyoumajiang-backend
    env: node
    region: singapore
    plan: free
    buildCommand: |
      corepack enable
      corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile
      pnpm run build:protocol
      cd packages/backend && npx prisma generate && cd ../..
      pnpm run build:backend
    startCommand: node packages/backend/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: HOSTNAME
        value: render-1
      - key: REDIS_HOST
        value: localhost
