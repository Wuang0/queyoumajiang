services:
  - type: web
    name: queyoumajiang-backend
    env: node
    region: singapore
    plan: free
    buildCommand: |
      npm install -g pnpm@9
      pnpm install --no-frozen-lockfile
      pnpm --filter @queyou/protocol build
      cd packages/backend && npx prisma@5.8 generate && cd ../..
      cd packages/backend && npx -y @nestjs/cli build && cd ../..
    startCommand: node packages/backend/dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: HOSTNAME
        value: render-1
      - key: REDIS_HOST
        value: localhost
