<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>雀友麻将 · 登录</title>
<link rel="stylesheet" href="_tokens.css">
<style>
  /* 登录页：纯居中卡片 + 桌面装饰背景 */
  .stage{
    position:absolute;left:60px;right:0;top:0;bottom:0;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }

  /* 背景装饰：散落的牌 */
  .bg-tiles{position:absolute;inset:0;pointer-events:none;}
  .bg-tile{
    position:absolute;
    width:54px;height:74px;
    background:linear-gradient(170deg,var(--cream-paper),var(--cream-deep));
    border-radius:7px;
    box-shadow:var(--shadow-tile);
    display:flex;align-items:center;justify-content:center;
    font-family:"STKaiti","KaiTi",serif;font-size:30px;
    color:var(--ink-deep);opacity:.55;
  }
  .bg-tile.cinnabar{color:var(--cinnabar);}
  .bg-tile.t1{ left:6%; top:18%; transform:rotate(-18deg);}
  .bg-tile.t2{ left:14%; bottom:12%; transform:rotate(12deg);}
  .bg-tile.t3{ right:8%; top:14%; transform:rotate(20deg);}
  .bg-tile.t4{ right:14%; bottom:18%; transform:rotate(-10deg);}

  /* 中央 logo + 卡片 */
  .center{
    display:flex;flex-direction:column;align-items:center;
    z-index:5;
  }
  .brand-mark{
    width:64px;height:64px;border-radius:14px;
    background:linear-gradient(160deg,var(--brand-jade-soft) 0%, var(--brand-jade-deep) 100%);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:36px;font-weight:600;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.2), 0 12px 28px rgba(43,122,61,.30);
    font-family:"STKaiti","KaiTi",serif;
    margin-bottom:14px;
  }
  .brand-name{
    font-size:22px;font-weight:600;letter-spacing:.18em;color:var(--ink-deep);
  }
  .brand-tagline{
    font-size:11px;color:var(--ink-mute);letter-spacing:.18em;
    margin-top:6px;font-family:"STKaiti","KaiTi",serif;
  }

  .login-btn{
    margin-top:32px;
    background:#07C160;
    color:#fff;
    padding:13px 38px;
    border-radius:var(--r-md);
    display:flex;align-items:center;gap:10px;
    cursor:pointer;
    font-size:14px;font-weight:600;
    box-shadow:0 8px 18px rgba(7,193,96,.30);
    letter-spacing:.08em;
  }
  .wx-icon{
    font-size:18px;
  }

  .privacy{
    margin-top:24px;
    font-size:10px;color:var(--ink-mute);
    letter-spacing:.08em;text-align:center;
    max-width:380px;line-height:1.6;
  }
  .privacy a{color:var(--brand-jade);text-decoration:none;}

  /* 标语 */
  .footer-tagline{
    position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
    font-size:10px;color:var(--ink-mute);letter-spacing:.18em;
    font-family:"STKaiti","KaiTi",serif;
  }
</style>
</head>
<body>
<div class="device">
  <span class="meta-note">812 × 375 · 登录页</span>

  <div class="stage">
    <!-- 背景装饰 -->
    <div class="bg-tiles">
      <div class="bg-tile t1 cinnabar">中</div>
      <div class="bg-tile t2">發</div>
      <div class="bg-tile t3">東</div>
      <div class="bg-tile t4 cinnabar">五</div>
    </div>

    <!-- 中央 -->
    <div class="center">
      <div class="brand-mark">雀</div>
      <div class="brand-name">雀友麻将</div>
      <div class="brand-tagline">朋 · 友 · 茶 · 局</div>

      <div class="login-btn">
        <span class="wx-icon">⌬</span>
        <span>微 信 一 键 登 录</span>
      </div>

      <div class="privacy">
        登录即表示同意 <a>《用户协议》</a> 与 <a>《隐私政策》</a><br>
        我们不会收集除 微信昵称、头像 之外的任何信息
      </div>
    </div>
  </div>

  <div class="footer-tagline">群 里 一 张 卡 片 · 三 十 秒 开 局</div>

  <span class="skill-watermark">QUEYOU · v0.2 mockup</span>
</div>
</body>
</html>
