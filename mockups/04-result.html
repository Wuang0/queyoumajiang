<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>雀友麻将 · 终局结算</title>
<link rel="stylesheet" href="_tokens.css">
<style>
  .header{
    height:48px;padding:0 24px 0 60px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid rgba(31,41,51,.06);
    position:relative;z-index:10;
  }
  .back-btn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);cursor:pointer;font-size:18px;}
  .title{font-size:14px;font-weight:600;letter-spacing:.18em;color:var(--ink-deep);}
  .meta{font-size:11px;color:var(--ink-mute);font-family:"SF Mono",monospace;letter-spacing:.04em;}

  .main{
    height:calc(100% - 48px);
    display:grid;grid-template-columns:340px 1fr;
    padding:18px 28px 18px 76px;gap:24px;
  }

  /* 左：冠军卡 */
  .winner-card{
    background:linear-gradient(165deg, var(--cream-paper) 0%, var(--cream-deep) 100%);
    border-radius:var(--r-lg);
    padding:18px;
    box-shadow:var(--shadow-2);
    position:relative;
    overflow:hidden;
    display:flex;flex-direction:column;justify-content:space-between;
  }
  .winner-card::before{
    content:"";
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:280px;height:280px;border-radius:50%;
    background:radial-gradient(circle, rgba(196,56,46,.05) 0%, transparent 70%);
  }
  .crown-row{display:flex;align-items:center;gap:14px;position:relative;}
  .crown-avatar{
    width:56px;height:56px;font-size:22px;
    box-shadow:0 0 0 3px var(--cinnabar), 0 6px 14px rgba(196,56,46,.30);
  }
  .crown-meta{flex:1;}
  .crown-rank{
    font-family:"STKaiti","KaiTi",serif;
    font-size:12px;color:var(--cinnabar);letter-spacing:.18em;
    margin-bottom:2px;
  }
  .crown-name{font-size:18px;font-weight:600;color:var(--ink-deep);}
  .crown-score{
    font-family:"SF Mono",monospace;
    font-size:36px;font-weight:600;
    color:var(--cinnabar);letter-spacing:.04em;line-height:1;
    margin-top:6px;
  }

  .stats-row{
    display:flex;gap:14px;
    border-top:1px dashed rgba(31,41,51,.10);
    padding-top:12px;margin-top:12px;
    position:relative;
  }
  .stat{flex:1;text-align:center;}
  .stat-val{font-family:"SF Mono",monospace;font-size:18px;font-weight:600;color:var(--ink-deep);}
  .stat-label{font-size:10px;color:var(--ink-mute);letter-spacing:.08em;margin-top:2px;}

  .actions{display:flex;gap:10px;margin-top:14px;position:relative;}
  .btn{
    flex:1;padding:11px;border-radius:var(--r-md);
    font-size:13px;font-weight:600;letter-spacing:.08em;
    cursor:pointer;text-align:center;transition:transform .12s;
  }
  .btn:hover{transform:translateY(-1px);}
  .btn-primary{
    background:linear-gradient(165deg,var(--brand-jade-soft) 0%, var(--brand-jade) 70%);
    color:#fff;box-shadow:0 4px 10px rgba(43,122,61,.25);
  }
  .btn-secondary{
    background:#fff;color:var(--ink-deep);
    border:1px solid rgba(31,41,51,.10);box-shadow:var(--shadow-1);
  }
  .back-hall{
    text-align:center;font-size:11px;color:var(--ink-mute);
    letter-spacing:.18em;margin-top:10px;cursor:pointer;
  }
  .back-hall:hover{color:var(--brand-jade);}

  /* 右：排名 + 战况 */
  .right-pane{display:flex;flex-direction:column;gap:14px;}
  .rank-list{
    background:rgba(255,255,255,.5);
    border:1px solid rgba(31,41,51,.06);
    border-radius:var(--r-md);
    padding:6px;
  }
  .rank-row{
    display:flex;align-items:center;gap:12px;
    padding:10px 12px;border-radius:var(--r-sm);
  }
  .rank-row + .rank-row{border-top:1px dashed rgba(31,41,51,.06);}
  .rank-medal{
    width:24px;height:24px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:600;flex-shrink:0;
    font-family:"SF Mono",monospace;
  }
  .rank-medal.r2{background:rgba(184,151,91,.20);color:var(--gold-faint);}
  .rank-medal.r3{background:rgba(217,136,59,.18);color:var(--warning);}
  .rank-medal.r4{background:rgba(31,41,51,.06);color:var(--ink-mute);}
  .rank-row .avatar{width:32px;height:32px;font-size:13px;}
  .rank-meta{flex:1;}
  .rank-name{font-size:13px;font-weight:600;line-height:1.3;}
  .rank-rank{font-size:10px;color:var(--ink-mute);}
  .rank-score{
    font-family:"SF Mono",monospace;font-weight:600;font-size:16px;
    letter-spacing:.04em;
  }
  .rank-score.win{color:var(--brand-jade);}
  .rank-score.lose{color:var(--cinnabar);}

  .summary-card{
    background:rgba(255,255,255,.5);
    border:1px solid rgba(31,41,51,.06);
    border-radius:var(--r-md);
    padding:12px 16px;
  }
  .summary-title{font-size:11px;color:var(--ink-mute);letter-spacing:.18em;margin-bottom:8px;}
  .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .summary-item{}
  .summary-val{font-family:"SF Mono",monospace;font-size:15px;font-weight:600;color:var(--ink-deep);}
  .summary-label{font-size:10px;color:var(--ink-mute);letter-spacing:.04em;margin-top:1px;}
  .highlight-row{
    margin-top:10px;padding-top:10px;
    border-top:1px dashed rgba(31,41,51,.10);
    font-size:12px;color:var(--ink-soft);display:flex;align-items:center;gap:8px;
  }
  .highlight-row .label{color:var(--ink-mute);font-size:10px;letter-spacing:.18em;}
  .highlight-row .val{color:var(--cinnabar);font-weight:600;}
  .highlight-row .tile-mini{
    display:inline-flex;align-items:center;justify-content:center;
    width:18px;height:24px;border-radius:3px;
    background:linear-gradient(170deg,var(--cream-paper),var(--cream-deep));
    font-family:"STKaiti","KaiTi",serif;font-size:13px;color:var(--cinnabar);
    box-shadow:var(--shadow-tile);
  }
</style>
</head>
<body>
<div class="device">
  <span class="meta-note">812 × 375 · 终局结算页</span>

  <div class="header">
    <div class="back-btn">‹</div>
    <div class="title">终 局 结 算</div>
    <div class="meta">房 123456 · 8 局 完成</div>
  </div>

  <div class="main">
    <!-- 左：冠军卡 -->
    <div class="winner-card">
      <div>
        <div class="crown-row">
          <div class="avatar crown-avatar">王</div>
          <div class="crown-meta">
            <div class="crown-rank">榜 首 · 雀友三段</div>
            <div class="crown-name">王 哥</div>
          </div>
        </div>
        <div class="crown-score">+42</div>

        <div class="stats-row">
          <div class="stat">
            <div class="stat-val">5</div>
            <div class="stat-label">胡 牌</div>
          </div>
          <div class="stat">
            <div class="stat-val">3</div>
            <div class="stat-label">自 摸</div>
          </div>
          <div class="stat">
            <div class="stat-val">2</div>
            <div class="stat-label">杠</div>
          </div>
          <div class="stat">
            <div class="stat-val">32</div>
            <div class="stat-label">最 大 番</div>
          </div>
        </div>
      </div>

      <div>
        <div class="actions">
          <div class="btn btn-primary">再 来 一 局</div>
          <div class="btn btn-secondary">截 图 分 享</div>
        </div>
        <div class="back-hall">回 到 大 厅 →</div>
      </div>
    </div>

    <!-- 右：排名 + 战况 -->
    <div class="right-pane">
      <div class="rank-list">
        <div class="rank-row">
          <div class="rank-medal r2">2</div>
          <div class="avatar">李</div>
          <div class="rank-meta">
            <div class="rank-name">小 李</div>
            <div class="rank-rank">雀友 · 一段</div>
          </div>
          <div class="rank-score win">+18</div>
        </div>
        <div class="rank-row">
          <div class="rank-medal r3">3</div>
          <div class="avatar">张</div>
          <div class="rank-meta">
            <div class="rank-name">张 姐</div>
            <div class="rank-rank">雀友 · 二段</div>
          </div>
          <div class="rank-score lose">−22</div>
        </div>
        <div class="rank-row">
          <div class="rank-medal r4">4</div>
          <div class="avatar">李</div>
          <div class="rank-meta">
            <div class="rank-name">李 姐</div>
            <div class="rank-rank">雀友 · 入门</div>
          </div>
          <div class="rank-score lose">−38</div>
        </div>
      </div>

      <div class="summary-card">
        <div class="summary-title">本 局 战 况</div>
        <div class="summary-grid">
          <div class="summary-item">
            <div class="summary-val">22 分</div>
            <div class="summary-label">总 时 长</div>
          </div>
          <div class="summary-item">
            <div class="summary-val">12.5</div>
            <div class="summary-label">平 均 番</div>
          </div>
          <div class="summary-item">
            <div class="summary-val">75%</div>
            <div class="summary-label">胡 牌 率</div>
          </div>
          <div class="summary-item">
            <div class="summary-val">2 次</div>
            <div class="summary-label">大 三 元</div>
          </div>
        </div>
        <div class="highlight-row">
          <span class="label">最 大 胡 牌</span>
          <span>清一色 + 自摸 +</span>
          <span class="tile-mini">中</span>
          <span class="tile-mini">中</span>
          <span class="val">32 番</span>
        </div>
      </div>
    </div>
  </div>

  <span class="skill-watermark">QUEYOU · v0.2 mockup</span>
</div>
</body>
</html>
